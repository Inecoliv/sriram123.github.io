<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; }
        .container { max-width: 600px; margin: 20px auto; background: white; border-radius: 8px; border: 1px solid #e1e1e1; overflow: hidden; }
        .header { background: #004a99; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; }
        .section-title { font-weight: bold; color: #004a99; border-bottom: 2px solid #004a99; margin: 20px 0 10px; }
        .box { background: #f8fbff; border: 1px solid #d0e3ff; padding: 15px; border-radius: 4px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h2>🔔 NEW B2B QUOTE REQUEST</h2></div>
        <div class="content">
            <div class="section-title">👤 Contact Details</div>
            <p><strong>Name:</strong> {name}<br><strong>Company:</strong> {company}<br><strong>Email:</strong> {email}</p>
            <div class="section-title">📋 Request Details</div>
            <div class="box">{message}</div>
        </div>
    </div>
</body>
</html>
