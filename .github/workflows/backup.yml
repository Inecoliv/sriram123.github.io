name: 15-Day Website Backup to Google Drive

on:
  schedule:
    # This runs at Midnight on the 1st and 16th of every month
    - cron: '0 0 1,16 * *'
  workflow_dispatch: # This allows you to click "Run" for testing!

jobs:
  run-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create Zip Archive
        run: |
          # Creates a zip file with the exact date (e.g., Inecoliv_Backup_21_04_2026.zip)
          ZIP_NAME="Inecoliv_Backup_$(date +'%d_%m_%Y').zip"
          zip -r "$ZIP_NAME" . -x "*.git*"
          echo "FILE_TO_UPLOAD=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload to Google Drive
        # Fixed the name of the tool below
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: ${{ env.FILE_TO_UPLOAD }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: "false"
